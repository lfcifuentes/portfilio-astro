  <text x="800" y="226" font-family="monospace" font-size="12" fill="#3483FA">$</text>
  <text x="816" y="226" font-family="monospace" font-size="12" fill="#e8eaf0"> whoami</text>
  <text x="800" y="252" font-family="monospace" font-size="12" fill="#00d296">→</text>
  <text x="818" y="252" font-family="monospace" font-size="12" fill="#8892a4"> Luis Cifuentes</text>
  <text x="800" y="278" font-family="monospace" font-size="12" fill="#3483FA">$</text>
  <text x="816" y="278" font-family="monospace" font-size="12" fill="#e8eaf0"> cat stack.txt</text>
  <text x="800" y="304" font-family="monospace" font-size="12" fill="#00d296">→</text>
  <text x="818" y="304" font-family="monospace" font-size="12" fill="#8892a4"> Python · Go · FastAPI</text>
  <text x="800" y="326" font-family="monospace" font-size="12" fill="#8892a4">   gRPC · Kafka · k8s</text>
  <text x="800" y="350" font-family="monospace" font-size="12" fill="#3483FA">$</text>
  <text x="816" y="350" font-family="monospace" font-size="12" fill="#e8eaf0"> status</text>
