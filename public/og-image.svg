  <text x="104" y="482" font-family="monospace" font-size="11" fill="#8892a4" letter-spacing="1">YEARS</text>

  <text x="220" y="460" font-family="Georgia, serif" font-size="38" font-weight="900" fill="#3483FA">10+</text>
  <text x="220" y="482" font-family="monospace" font-size="11" fill="#8892a4" letter-spacing="1">SYSTEMS BUILT</text>

  <text x="360" y="460" font-family="Georgia, serif" font-size="38" font-weight="900" fill="#3483FA">8+</text>
  <text x="360" y="482" font-family="monospace" font-size="11" fill="#8892a4" letter-spacing="1">TECHNOLOGIES</text>

