<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1526"/>
    </linearGradient>
    <!-- Blue glow -->
    <radialGradient id="glow" cx="75%" cy="30%" r="45%">
      <stop offset="0%" stop-color="#3483FA" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3483FA" stop-opacity="0"/>
    </radialGradient>
    <!-- Green glow -->
    <radialGradient id="glowGreen" cx="15%" cy="80%" r="35%">
      <stop offset="0%" stop-color="#00d296" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00d296" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Glow layers -->
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glowGreen)"/>

  <!-- Grid lines horizontal -->
